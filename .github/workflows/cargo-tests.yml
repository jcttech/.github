# Cargo Tests — reusable workflow
#
# Runs `cargo test` with a caller-supplied command, optional Postgres
# sidecar, optional pre-test bootstrap, and optional path-filter gating.
# The status check name is taken from the `name` input so each call shows
# up as a semantic split (e.g. `Unit`, `Integration`, `Server`, `Smoke`,
# `Storage`) rather than the legacy generic "Database Tests".
#
# Designed to be **matrix-dispatched** from `rust-pipeline.yml`'s
# `enable-cargo-tests` + `cargo-tests` inputs — each JSON entry the
# caller provides becomes one invocation of this workflow, running in
# parallel with sibling entries. A caller can also use this workflow
# directly without going through `rust-pipeline.yml`.
#
# ## Single-job design (revised)
#
# The first cut split this into two sibling jobs (`run-with-postgres`,
# `run-without-postgres`) gated on the `with-postgres` input — needed
# because GitHub Actions does not support conditional `services:`
# blocks. That worked but produced an ugly status check for the skipped
# sibling: the matrix-rendered display name was the literal expression
# `inputs.name` (skipped jobs don't run the name-evaluation phase).
#
# This revision collapses to a single job. The Postgres service is
# always declared and starts unconditionally; the DB-touching steps
# (psql install, init-sql, pre-test-script, DATABASE_URL on the test
# command) are individually gated on `inputs.with-postgres == 'true'`.
# Cost: ~10s of wasted Postgres startup per unit-test run (no DB).
# Benefit: one job per matrix entry, one semantic status check.
#
# ## Caller-relative path resolution
#
# `pre-test-script`, `init-sql`, and `working-directory` are interpreted
# relative to the CALLER's repo checkout — these files live in the
# consuming repo, not in `jcttech/.github`. This matches the convention
# in the sibling `rust-database-tests.yml`.
#
# ## Backwards / forwards compat
#
# Adding fields to the matrix entry JSON is additive — missing keys
# evaluate to empty strings, which are then defaulted on the input
# side here. Removing or renaming a field is a breaking change and
# would warrant a new tag (e.g. `@v3`).

name: Cargo Tests

on:
  workflow_call:
    inputs:
      name:
        type: string
        description: |
          Display name for this test split (e.g. "Unit", "Integration",
          "Server"). Becomes the job name in the Actions UI and the
          status check label on PRs.
      command:
        type: string
        description: |
          The cargo test command to run. Examples:
            cargo test --workspace
            cargo test -p foo -p bar --manifest-path crate/Cargo.toml
            cargo nextest run --workspace
      with-postgres:
        type: string
        default: 'false'
        description: |
          When 'true', the test step's environment includes
          DATABASE_URL pointing at the in-job Postgres service, plus
          the init-sql / pre-test-script bootstrap steps fire. When
          anything else (incl. empty string for matrix entries that
          omit the field), those DB-touching steps are skipped. The
          Postgres service still starts (~10s overhead) regardless —
          see the "Single-job design" comment at the top of this file.
      postgres-image:
        type: string
        default: 'postgres:18'
        description: 'Docker image for the Postgres service.'
      pre-test-script:
        type: string
        default: ''
        description: |
          Caller-relative path to a bash script run before the test
          command. Typical use: schema bootstrap (e.g. `make
          schema-apply` + a sqlx migrator). Receives the same DB env
          as the test step. Only honoured when with-postgres="true".
      init-sql:
        type: string
        default: ''
        description: |
          Caller-relative path to a SQL script run via `psql` before
          the pre-test-script. Only honoured when with-postgres="true".
      code-paths:
        type: string
        default: ''
        description: |
          Optional newline-separated glob list. When set and the event
          is `pull_request`, `dorny/paths-filter@v4` decides whether
          this entry runs; an empty match-set skips every subsequent
          step (job exits green in <30 s). Empty default = always run.
          Push events always run regardless.
      working-directory:
        type: string
        default: '.'
        description: 'cwd for the test command (and the pre-test-script).'
      runner:
        type: string
        default: 'github-arc-github-arc-runner-set'
        description: 'Runner label.'
      container-image:
        type: string
        default: 'ghcr.io/jcttech/devcontainer-rust:latest'
        description: |
          Container image for the job pod (ARC K8s mode). Empty string
          runs directly on the runner host.
      rust-version:
        type: string
        default: 'stable'
        description: 'Rust toolchain channel forwarded to rust-setup@v1.'
      pg-host:
        type: string
        default: 'localhost'
        description: |
          PostgreSQL service hostname. Use `localhost` for ARC K8s and
          GHA runners; the service name for Docker-mode runners.

jobs:
  run:
    name: ${{ inputs.name }}
    runs-on: ${{ inputs.runner }}
    container: ${{ inputs.container-image || null }}
    services:
      postgres:
        image: ${{ inputs.postgres-image }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PG_HOST: ${{ inputs.pg-host }}
    steps:
      - uses: actions/checkout@v5

      - name: Mark workspace safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build paths-filter input
        id: build-filter
        if: inputs.code-paths != '' && github.event_name == 'pull_request'
        run: |
          PATHS=$(echo "${{ inputs.code-paths }}" | sed '/^$/d' | sed 's/^/      - /')
          {
            echo "filters<<EOF"
            echo "relevant:"
            echo "$PATHS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compute should-run from code-paths
        id: changes
        if: inputs.code-paths != '' && github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: ${{ steps.build-filter.outputs.filters }}

      - name: Decide should-run
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ inputs.code-paths }}" ]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=${{ steps.changes.outputs.relevant }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust
        if: steps.gate.outputs.should-run == 'true'
        uses: jcttech/.github/.github/actions/rust-setup@v1
        with:
          rust-version: ${{ inputs.rust-version }}

      - name: Configure cargo for private git deps
        if: steps.gate.outputs.should-run == 'true'
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          if [ -z "$PRIVATE_REPO_TOKEN" ]; then
            echo "PRIVATE_REPO_TOKEN not set; cargo will use anonymous git access only"
            exit 0
          fi
          git config --global url."https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"
          echo "Configured private git auth via PRIVATE_REPO_TOKEN for cargo fetch"

      - name: Install PostgreSQL client
        if: >-
          steps.gate.outputs.should-run == 'true' &&
          inputs.with-postgres == 'true' &&
          (inputs.init-sql != '' || inputs.pre-test-script != '')
        shell: bash
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            echo "Installing postgresql-client..."
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y -qq postgresql-client
            elif command -v apk >/dev/null 2>&1; then
              sudo apk add --no-cache postgresql-client
            else
              echo "::error::Cannot install psql — no supported package manager found"
              exit 1
            fi
          fi
          psql --version

      - name: Initialize database
        if: >-
          steps.gate.outputs.should-run == 'true' &&
          inputs.with-postgres == 'true' &&
          inputs.init-sql != ''
        env:
          PGHOST: ${{ env.PG_HOST }}
          PGUSER: test
          PGPASSWORD: test
          PGDATABASE: test_db
        run: psql -f ${{ inputs.init-sql }}

      - name: Run pre-test script
        if: >-
          steps.gate.outputs.should-run == 'true' &&
          inputs.with-postgres == 'true' &&
          inputs.pre-test-script != ''
        shell: bash
        env:
          PGHOST: ${{ env.PG_HOST }}
          PGUSER: test
          PGPASSWORD: test
          PGDATABASE: test_db
          DATABASE_URL: postgres://test:test@${{ env.PG_HOST }}:5432/test_db
        run: bash "${{ inputs.pre-test-script }}"

      - name: Run cargo tests (with DATABASE_URL)
        if: steps.gate.outputs.should-run == 'true' && inputs.with-postgres == 'true'
        working-directory: ${{ inputs.working-directory }}
        env:
          DATABASE_URL: postgres://test:test@${{ env.PG_HOST }}:5432/test_db
        run: ${{ inputs.command }}

      - name: Run cargo tests
        if: steps.gate.outputs.should-run == 'true' && inputs.with-postgres != 'true'
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.command }}
