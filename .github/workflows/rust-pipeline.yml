# Rust Pipeline — reusable workflow (@v2)
#
# Aggregates change detection, build/clippy/test, optional sibling
# workflows (cargo-tests matrix, openapi-drift, leptos-web-build,
# rust-docs), Docker image build/push, and tagged GitHub releases
# under one caller-friendly entry point. Each sibling is opt-in via
# an `enable-*` flag (default `false` for the opt-in sub-jobs,
# default `true` for build/docker/release). Pass-through inputs for
# each sibling are prefixed `<sub-job>-*` so callers can configure
# them without colliding on shared names like `code-paths` or
# `container-image`.
#
# `serialize-jobs:` toggle: when `true`, the chain
# `openapi-drift → web-build` runs fail-fast — a chain link only
# proceeds if the previous link reported `success` or was skipped
# (a failure cascades into a skip on the next link, mirroring the
# in-repo `needs:` chain pattern). When `false` (the default),
# failures don't cascade between chain links: each enabled link
# runs independently. The wall-clock `needs:` chain is static —
# GitHub Actions doesn't support dynamic `needs:`, so non-serial
# mode still waits for the previous link to finish before starting
# the next; the toggle controls failure propagation, not literal
# parallelism. `docker` and `release` keep their pre-existing
# `!failure() && !cancelled()` semantics — failure of any chain
# link still blocks the image push and the release artifact upload.
#
# @v2 — Breaking change from @v1
#
# The legacy single-command `enable-database-tests` path and its
# `database-test-command` / `database-tests-*` inputs are REMOVED.
# Callers that used `enable-database-tests: true` must migrate to
# the matrix-driven `enable-cargo-tests: true` + `cargo-tests:`
# JSON array shape. The sibling `rust-database-tests.yml` still
# exists in this repo and can still be called directly, but
# `rust-pipeline.yml@v2` no longer dispatches to it. See the
# `enable-cargo-tests` input docstring for the matrix entry schema.

name: Rust Pipeline

on:
  workflow_call:
    inputs:
      code-paths:
        type: string
        default: |
          src/**
          Cargo.toml
          Cargo.lock
          Dockerfile
          tests/**
        description: 'Newline-separated glob patterns for code files'
      rust-version:
        type: string
        default: 'stable'
      enable-docker:
        type: boolean
        default: true
      enable-release:
        type: boolean
        default: true
      enable-build:
        type: boolean
        default: true
        description: 'Enable build, clippy, and test job'
      enable-docs:
        type: boolean
        default: false
        description: 'Enable rustdoc generation and documentation coverage'
      enable-rustdoc:
        type: boolean
        default: true
        description: 'Enable rustdoc generation (only applies when enable-docs is true)'
      doc-args:
        type: string
        default: '--workspace --no-deps --document-private-items'
        description: 'Arguments passed to cargo doc'
      enable-cargo-tests:
        type: boolean
        default: false
        description: |
          Opt into the matrix-driven `cargo-tests.yml` sub-job. Lets
          callers split their test surface into multiple named entries
          (Unit, Integration, Server, etc.) that run in parallel, each
          with its own command, optional Postgres sidecar, optional
          bootstrap script, and optional path filter. Provide the matrix
          via `cargo-tests` (JSON array). This is the v2 replacement
          for the legacy `enable-database-tests` mono-command shape,
          which was removed in this version.
      cargo-tests:
        type: string
        default: '[]'
        description: |
          JSON array of matrix entries forwarded to `cargo-tests.yml`.
          Each entry object may contain:
            name              (string, required) — display name; becomes the status check label
            command           (string, required) — cargo test command
            with-postgres     (string, default 'false') — 'true' spins up the Postgres sidecar
            postgres-image    (string, default 'postgres:18')
            pre-test-script   (string, default '') — caller-relative bash bootstrap
            init-sql          (string, default '') — caller-relative SQL bootstrap (psql)
            code-paths        (string, default '') — newline-separated globs; empty = always run
            working-directory (string, default '.') — cwd for the test command
          Example: '[{"name":"Unit","command":"cargo test -p foo"},{"name":"Integration","command":"cargo test -p bar","with-postgres":"true","pre-test-script":"./scripts/migrate.sh"}]'
      enable-openapi-drift:
        type: boolean
        default: false
        description: |
          Opt into the OpenAPI drift-detection sub-job. When `true`,
          `openapi-drift-print-command` and
          `openapi-drift-committed-spec-path` MUST also be set (those
          inputs are required on the underlying reusable workflow).
      openapi-drift-print-command:
        type: string
        default: ''
        description: |
          Forwarded to `openapi-drift.yml` as `print-command`. Command
          run inside `openapi-drift-working-directory` that prints the
          live OpenAPI spec to stdout (e.g.
          `cargo run -p server -- --print-openapi`). Required when
          `enable-openapi-drift` is `true`.
      openapi-drift-committed-spec-path:
        type: string
        default: ''
        description: |
          Forwarded to `openapi-drift.yml` as `committed-spec-path`.
          Repo-root-relative path of the committed OpenAPI spec to
          diff the live output against. Required when
          `enable-openapi-drift` is `true`.
      openapi-drift-working-directory:
        type: string
        default: '.'
        description: |
          Forwarded to `openapi-drift.yml` as `working-directory`.
          Directory in which `openapi-drift-print-command` runs.
      openapi-drift-container-image:
        type: string
        default: 'ghcr.io/jcttech/devcontainer-rust-leptos:latest'
        description: |
          Forwarded to `openapi-drift.yml` as `container-image`.
          Container image for the openapi-drift job pod.
      openapi-drift-code-paths:
        type: string
        default: ''
        description: |
          Newline-separated glob list forwarded to `openapi-drift.yml`
          as `code-paths` (D1 fast-lane). Empty default = always run.
      enable-web-build:
        type: boolean
        default: false
        description: |
          Opt into the Leptos web-build + size-gate sub-job.
      web-build-working-directory:
        type: string
        default: '.'
        description: |
          Forwarded to `leptos-web-build.yml` as `working-directory`.
      web-build-web-package:
        type: string
        default: 'web'
        description: |
          Forwarded to `leptos-web-build.yml` as `web-package`. Leptos
          hydrate-side crate name (e.g. `jtrader-web`).
      web-build-build-command:
        type: string
        default: 'make web-build'
        description: |
          Forwarded to `leptos-web-build.yml` as `build-command`.
          Release build + size-gate command run in
          `web-build-working-directory`.
      web-build-bindings-command:
        type: string
        default: 'make web-check-bindings'
        description: |
          Forwarded to `leptos-web-build.yml` as `bindings-command`.
          OpenAPI ⇄ client drift-check command. Pass `''` to skip.
      web-build-wall-script:
        type: string
        default: ''
        description: |
          Forwarded to `leptos-web-build.yml` as `wall-script`. Opt-in
          path to a project-specific lint/wall gate script. Pass `''`
          to skip.
      web-build-wasm-size-artifact:
        type: string
        default: ''
        description: |
          Forwarded to `leptos-web-build.yml` as `wasm-size-artifact`.
          Repo-root-relative path of a single file uploaded as an
          artefact. Pass `''` to skip.
      web-build-container-image:
        type: string
        default: 'ghcr.io/jcttech/devcontainer-rust-leptos:latest'
        description: |
          Forwarded to `leptos-web-build.yml` as `container-image`.
          Must carry cargo-leptos / wasm-bindgen-cli / wasm-opt /
          wasm32-unknown-unknown on `PATH`.
      web-build-code-paths:
        type: string
        default: ''
        description: |
          Newline-separated glob list forwarded to `leptos-web-build.yml`
          as `code-paths` (D1 fast-lane). Empty default = always run.
      serialize-jobs:
        type: boolean
        default: false
        description: |
          When `true`, the chain `openapi-drift → web-build` runs
          fail-fast: each chain link only proceeds if the previous link
          reported `success` or was skipped (failure cascades). When
          `false` (the default), failures don't cascade between chain
          links — each enabled link runs independently. The `needs:`
          chain itself is static (GitHub Actions doesn't support
          dynamic `needs:`), so non-serial mode still waits for the
          previous link to finish before starting; the flag controls
          failure propagation, not literal parallelism. `docker` and
          `release` always cascade failures from any chain link via
          their pre-existing `!failure()` semantics, regardless of this
          flag. The `cargo-tests` matrix (if enabled) runs independently
          of this chain — see that job's comment for details.
      tag-prefix:
        type: string
        default: ''
        description: 'Tag prefix for multi-binary workspaces (e.g. "session-manager/")'
      image-name:
        type: string
        default: ''
        description: 'Docker image name (defaults to github.repository)'
      dockerfile:
        type: string
        default: 'Dockerfile'
        description: 'Path to Dockerfile'
      binary-name:
        type: string
        default: ''
        description: 'Binary name to extract from build artifact for CI Docker image'
      ci-dockerfile:
        type: string
        default: ''
        description: 'CI-specific Dockerfile that copies pre-built binary (skips compilation)'
      runner:
        type: string
        default: 'github-arc-github-arc-runner-set'
        description: 'Runner label for build/test jobs'
      container-image:
        type: string
        default: 'ghcr.io/jcttech/devcontainer-rust:latest'
        description: 'Container image for job pods (required for ARC K8s mode, empty string for GHA runners)'
      sccache-recache:
        type: boolean
        default: false
        description: |
          When `true`, sets `SCCACHE_RECACHE=true` on the build job so
          rustc compilations bypass existing sccache entries and write
          fresh objects. Use to recover from poisoned cache on a
          persistent self-hosted `SCCACHE_DIR` (e.g. ICE / SIGSEGV
          from stale rustc objects after a toolchain bump). One-shot:
          flip back to `false` once the cache has been rewritten.

jobs:
  changes:
    runs-on: ${{ inputs.runner }}
    container: ${{ inputs.container-image || null }}
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5

      - name: Mark workspace safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build filter config
        id: build-filter
        run: |
          # Convert newline-separated paths to YAML list format
          PATHS=$(echo "${{ inputs.code-paths }}" | sed '/^$/d' | sed 's/^/      - /')
          echo "filters<<EOF" >> $GITHUB_OUTPUT
          echo "code:" >> $GITHUB_OUTPUT
          echo "$PATHS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: ${{ steps.build-filter.outputs.filters }}

  build:
    needs: changes
    if: >-
      inputs.enable-build &&
      (startsWith(github.ref, format('refs/tags/{0}v', inputs.tag-prefix)) ||
      github.event_name == 'pull_request' ||
      needs.changes.outputs.code == 'true')
    runs-on: ${{ inputs.runner }}
    container: ${{ inputs.container-image || null }}
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v5

      - name: Mark workspace safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Rust
        uses: jcttech/.github/.github/actions/rust-setup@v1
        with:
          rust-version: ${{ inputs.rust-version }}

      - name: Configure cargo for private git deps
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          if [ -z "$PRIVATE_REPO_TOKEN" ]; then
            echo "PRIVATE_REPO_TOKEN not set; cargo will use anonymous git access only"
            exit 0
          fi
          git config --global url."https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"
          echo "Configured private git auth via PRIVATE_REPO_TOKEN for cargo fetch"

      - name: Extract version from tag
        if: startsWith(github.ref, format('refs/tags/{0}v', inputs.tag-prefix))
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREFIX="${{ inputs.tag-prefix }}"
          VERSION="${TAG#${PREFIX}v}"
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Enable sccache recache
        if: inputs.sccache-recache
        run: echo "SCCACHE_RECACHE=true" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release

      - name: Clippy
        run: cargo clippy --release -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Stage binary to shared cache
        if: inputs.binary-name != '' && inputs.container-image != '' && (inputs.enable-docker || inputs.enable-release)
        run: |
          mkdir -p /cache/workflow/${{ github.run_id }}
          cp target/release/${{ inputs.binary-name }} /cache/workflow/${{ github.run_id }}/
          chmod +x /cache/workflow/${{ github.run_id }}/${{ inputs.binary-name }}

      - name: Upload binary artifact
        if: inputs.binary-name != '' && inputs.container-image == '' && (inputs.enable-docker || inputs.enable-release)
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: target/release/${{ inputs.binary-name }}

  # Matrix-driven cargo test splits — see `enable-cargo-tests` /
  # `cargo-tests` inputs. Each entry gets its own status check named
  # after `entry.name`. The chain-gate toggles on `serialize-jobs` do
  # NOT apply here: cargo-tests entries are independent of each other
  # and of the openapi-drift / web-build chain by design — a caller
  # that wants a cargo-tests gate on openapi-drift / web-build should
  # add an explicit `needs:` once they land in a future revision of
  # this workflow.
  cargo-tests:
    needs: changes
    if: >-
      inputs.enable-cargo-tests &&
      (startsWith(github.ref, format('refs/tags/{0}v', inputs.tag-prefix)) ||
      github.event_name == 'pull_request' ||
      needs.changes.outputs.code == 'true')
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(inputs.cargo-tests) }}
    uses: jcttech/.github/.github/workflows/cargo-tests.yml@v2
    secrets: inherit
    with:
      # `${{ expr || 'default' }}` fallbacks here are load-bearing —
      # when a matrix entry omits an optional key, the GitHub
      # expression evaluator passes empty string to the called
      # workflow, which OVERRIDES the called workflow's input default
      # (an empty string is not "missing", it's "explicitly empty").
      # For `postgres-image`, an empty string skips the entire service
      # container start, which breaks every with-postgres="true"
      # caller — see PR #281 run 26703782289.
      name: ${{ matrix.entry.name }}
      command: ${{ matrix.entry.command }}
      with-postgres: ${{ matrix.entry.with-postgres || 'false' }}
      postgres-image: ${{ matrix.entry.postgres-image || 'postgres:18' }}
      pre-test-script: ${{ matrix.entry.pre-test-script || '' }}
      init-sql: ${{ matrix.entry.init-sql || '' }}
      code-paths: ${{ matrix.entry.code-paths || '' }}
      working-directory: ${{ matrix.entry.working-directory || '.' }}
      runner: ${{ inputs.runner }}
      container-image: ${{ inputs.container-image }}
      rust-version: ${{ inputs.rust-version }}

  openapi-drift:
    needs: changes
    if: >-
      !cancelled() &&
      inputs.enable-openapi-drift &&
      (startsWith(github.ref, format('refs/tags/{0}v', inputs.tag-prefix)) ||
      github.event_name == 'pull_request' ||
      needs.changes.outputs.code == 'true')
    uses: jcttech/.github/.github/workflows/openapi-drift.yml@v1
    secrets: inherit
    with:
      print-command: ${{ inputs.openapi-drift-print-command }}
      committed-spec-path: ${{ inputs.openapi-drift-committed-spec-path }}
      working-directory: ${{ inputs.openapi-drift-working-directory }}
      container-image: ${{ inputs.openapi-drift-container-image }}
      code-paths: ${{ inputs.openapi-drift-code-paths }}

  web-build:
    needs: [changes, openapi-drift]
    if: >-
      !cancelled() &&
      inputs.enable-web-build &&
      (!inputs.serialize-jobs ||
        needs.openapi-drift.result == 'success' ||
        needs.openapi-drift.result == 'skipped') &&
      (startsWith(github.ref, format('refs/tags/{0}v', inputs.tag-prefix)) ||
      github.event_name == 'pull_request' ||
      needs.changes.outputs.code == 'true')
    uses: jcttech/.github/.github/workflows/leptos-web-build.yml@v1
    secrets: inherit
    with:
      working-directory: ${{ inputs.web-build-working-directory }}
      web-package: ${{ inputs.web-build-web-package }}
      build-command: ${{ inputs.web-build-build-command }}
      bindings-command: ${{ inputs.web-build-bindings-command }}
      wall-script: ${{ inputs.web-build-wall-script }}
      wasm-size-artifact: ${{ inputs.web-build-wasm-size-artifact }}
      container-image: ${{ inputs.web-build-container-image }}
      code-paths: ${{ inputs.web-build-code-paths }}

  docs:
    needs: changes
    if: >-
      inputs.enable-docs &&
      (github.event_name == 'pull_request' ||
      needs.changes.outputs.code == 'true')
    uses: jcttech/.github/.github/workflows/rust-docs.yml@v1
    secrets: inherit
    with:
      rust-version: ${{ inputs.rust-version }}
      doc-args: ${{ inputs.doc-args }}
      enable-rustdoc: ${{ inputs.enable-rustdoc }}
      runner: ${{ inputs.runner }}
      container-image: ${{ inputs.container-image }}

  docker:
    needs: [changes, build, cargo-tests, openapi-drift, web-build]
    if: >-
      !failure() && !cancelled() &&
      inputs.enable-docker &&
      (startsWith(github.ref, format('refs/tags/{0}v', inputs.tag-prefix)) ||
      (github.ref == 'refs/heads/main' && needs.changes.outputs.code == 'true'))
    runs-on: ${{ inputs.runner }}
    container: ${{ inputs.container-image || null }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Mark workspace safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download binary artifact
        if: inputs.binary-name != '' && inputs.container-image == ''
        uses: actions/download-artifact@v4
        with:
          name: binary
          path: ./artifact

      - name: Retrieve binary from shared cache
        if: inputs.binary-name != '' && inputs.container-image != ''
        run: |
          mkdir -p ./artifact
          cp /cache/workflow/${{ github.run_id }}/${{ inputs.binary-name }} ./artifact/

      - name: Prepare binary
        if: inputs.binary-name != ''
        run: chmod +x ./artifact/${{ inputs.binary-name }}

      - name: Login to registry (Docker)
        if: inputs.container-image == ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure podman storage (rootless overlay via fuse-overlayfs)
        if: inputs.container-image != ''
        run: |
          # Rootless podman in an unprivileged container can't mount real
          # overlayfs. Force the userspace fuse-overlayfs helper so
          # overlay works without CAP_SYS_ADMIN. Requires /dev/fuse
          # exposed by the runner pod template.
          if [ ! -e /dev/fuse ]; then
            echo "::warning::/dev/fuse not present — fuse-overlayfs will fail; pod template needs to expose it"
          fi
          mkdir -p "$HOME/.config/containers"
          cat > "$HOME/.config/containers/storage.conf" <<'EOF'
          [storage]
          driver = "overlay"

          [storage.options]
          mount_program = "/usr/bin/fuse-overlayfs"
          EOF

      - name: Login to registry (Podman)
        if: inputs.container-image != ''
        run: podman login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

      - name: Build and push
        uses: jcttech/.github/.github/actions/docker-build@v1
        with:
          sha: ${{ needs.build.outputs.sha_short }}
          image-name: ${{ inputs.image-name }}
          dockerfile: ${{ inputs.ci-dockerfile || inputs.dockerfile }}
          tag-prefix: ${{ inputs.tag-prefix }}

  release:
    needs: [build, docker, cargo-tests, openapi-drift, web-build]
    if: >-
      !failure() && !cancelled() &&
      inputs.enable-release &&
      startsWith(github.ref, format('refs/tags/{0}v', inputs.tag-prefix))
    runs-on: ${{ inputs.runner }}
    container: ${{ inputs.container-image || null }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Mark workspace safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download binary artifact
        if: inputs.binary-name != '' && inputs.container-image == ''
        uses: actions/download-artifact@v4
        with:
          name: binary
          path: ./artifacts

      - name: Retrieve binary from shared cache
        if: inputs.binary-name != '' && inputs.container-image != ''
        run: |
          mkdir -p ./artifacts
          cp /cache/workflow/${{ github.run_id }}/${{ inputs.binary-name }} ./artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./artifacts/*

      - name: Cleanup shared cache
        if: always() && inputs.container-image != ''
        run: rm -rf /cache/workflow/${{ github.run_id }}
