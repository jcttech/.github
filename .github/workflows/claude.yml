name: Claude

on:
  workflow_call:
    inputs:
      model:
        type: string
        default: 'claude-sonnet-4-6'
        description: 'Claude model to use'
      max-turns:
        type: number
        default: 30
        description: 'Maximum conversation turns'
      timeout-minutes:
        type: number
        default: 30
        description: 'Maximum runtime in minutes'
      runner:
        type: string
        default: 'ubuntu-latest'
        description: 'GitHub Actions runner to use'
    # Declared explicitly so callers can pass named secrets instead of
    # `secrets: inherit` (least-privilege trust boundary). Both are optional
    # because either credential alone is sufficient for claude-code-action.
    secrets:
      ANTHROPIC_API_KEY:
        required: false
        description: 'Anthropic API key (alternative to CLAUDE_CODE_OAUTH_TOKEN)'
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
        description: 'Claude Code OAuth token (alternative to ANTHROPIC_API_KEY)'

jobs:
  claude:
    name: Claude
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    # Least privilege: the comment-triggered agent reads the repo and posts to
    # PRs/issues; it must not push code (`contents: read`, not `write`).
    # `id-token: write` is required by claude-code-action's OIDC exchange for
    # its GitHub App token; `actions: read` lets it inspect CI results.
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns ${{ inputs.max-turns }}
