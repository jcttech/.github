name: Rust Database Tests

on:
  workflow_call:
    inputs:
      test-command:
        type: string
        default: 'cargo test --test database_tests -- --nocapture'
      postgres-image:
        type: string
        default: 'postgres:18'
      rust-version:
        type: string
        default: 'stable'
      runner:
        type: string
        default: 'github-arc-github-arc-runner-set'
        description: 'Runner label for database test jobs'
      container-image:
        type: string
        default: 'ghcr.io/jcttech/devcontainer-rust:latest'
        description: 'Container image for job pods (required for ARC K8s mode, empty string for GHA runners)'
      init-sql:
        type: string
        default: ''
        description: 'Path to SQL init script run via psql before tests'

jobs:
  database-tests:
    name: Database Tests
    runs-on: ${{ inputs.runner }}
    container: ${{ inputs.container-image || null }}
    services:
      postgres:
        image: ${{ inputs.postgres-image }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # In containerized jobs, services are accessed by their name; on GHA runners, via localhost
      PG_HOST: ${{ inputs.container-image && 'postgres' || 'localhost' }}
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Rust
        uses: jcttech/.github/.github/actions/rust-setup@v1
        with:
          rust-version: ${{ inputs.rust-version }}

      - name: Install PostgreSQL client
        if: inputs.init-sql != ''
        run: |
          if ! command -v psql &>/dev/null; then
            apt-get update -qq && apt-get install -y -qq postgresql-client > /dev/null 2>&1 || true
          fi

      - name: Initialize database
        if: inputs.init-sql != ''
        env:
          PGHOST: ${{ env.PG_HOST }}
          PGUSER: test
          PGPASSWORD: test
          PGDATABASE: test_db
        run: psql -f ${{ inputs.init-sql }}

      - name: Run database tests
        env:
          DATABASE_URL: postgres://test:test@${{ env.PG_HOST }}:5432/test_db
        run: ${{ inputs.test-command }}
