name: Claude PR Review

on:
  workflow_call:
    inputs:
      model:
        type: string
        default: 'claude-opus-4-6'
        description: 'Claude model to use for review'
      max-turns:
        type: number
        default: 20
        description: 'Maximum conversation turns (controls cost)'
      timeout-minutes:
        type: number
        default: 15
        description: 'Maximum runtime in minutes'
      runner:
        type: string
        default: 'ubuntu-latest'
        description: 'GitHub Actions runner to use'
      review-extra:
        type: string
        default: ''
        description: 'Additional review instructions appended to the default prompt'

jobs:
  review:
    name: Claude Review
    runs-on: ${{ inputs.runner }}
    if: github.event.pull_request.draft == false
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          use_sticky_comment: true
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns ${{ inputs.max-turns }}
            --allowedTools "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.
            The PR branch is already checked out in the current working directory.

            ## How Your Review Gets Posted

            Your text output IS the review comment — it gets posted automatically as a PR comment.
            Do NOT call `gh pr comment`. Just write your review as formatted markdown text.

            ## Process (follow this exact order)

            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to get the full diff.
            2. If needed, use Read/Glob/Grep to examine specific changed files for more context.
            3. Output your review as markdown text. Start writing EARLY — a partial review is better than none.

            You have ${{ inputs.max-turns }} turns total. Use at most HALF for reading code.
            If you cannot review all files, review what you can and list the rest as unreviewed.

            ## Review Output Format

            Structure your review exactly like this:

            ### Summary
            One-paragraph summary of what the PR does.

            ### Findings
            For each issue, use: **[SEVERITY]** `file:line` — Description and suggested fix.
            Severity: CRITICAL / HIGH / MEDIUM / LOW
            If no issues, say the PR looks good.

            ### Files Reviewed
            List files you reviewed. Note any skipped due to turn budget.

            ## What to Look For

            1. **Bugs**: Logic errors, race conditions, edge cases, resource leaks
            2. **Security**: Injection, XSS, exposed secrets, input validation
            3. **Code Quality**: Readable, well-structured, follows project conventions
            4. **Performance**: Unnecessary allocations, N+1 queries, blocking in async
            5. **Testing**: New code paths covered? Edge cases? Meaningful assertions?

            ## Rules
            - ONLY comment on changed code (the diff), not pre-existing issues
            - Be constructive: suggest fixes, not just problems
            - If the PR looks good, say so — do not invent issues to nitpick
            - Check CLAUDE.md in the repo root for project-specific conventions

            ${{ inputs.review-extra }}
