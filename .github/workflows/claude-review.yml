name: Claude PR Review

on:
  workflow_call:
    inputs:
      model:
        type: string
        default: 'claude-opus-4-6'
        description: 'Claude model to use for review'
      max-turns:
        type: number
        default: 50
        description: 'Maximum conversation turns (controls cost)'
      timeout-minutes:
        type: number
        default: 20
        description: 'Maximum runtime in minutes'
      runner:
        type: string
        default: 'ubuntu-latest'
        description: 'GitHub Actions runner to use'
      review-extra:
        type: string
        default: ''
        description: 'Additional review instructions appended to the default prompt'

jobs:
  review:
    name: Claude Review
    runs-on: ${{ inputs.runner }}
    if: github.event.pull_request.draft == false
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve addressed threads before review
        id: pre-resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR=${{ github.event.pull_request.number }}

          # Fetch all review threads from github-actions[bot]
          gh api graphql -f query='
            query {
              repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                pullRequest(number: '"$PR"') {
                  reviewThreads(first: 100) {
                    nodes {
                      id
                      isResolved
                      path
                      line
                      comments(first: 1) {
                        nodes { author { login } body }
                      }
                    }
                  }
                }
              }
            }' > /tmp/review-threads.json 2>/dev/null || echo '{"data":{"repository":{"pullRequest":{"reviewThreads":{"nodes":[]}}}}}' > /tmp/review-threads.json

          # Get the diff line ranges to detect which lines were modified in the latest push
          # Also get list of files in the diff
          gh pr diff "$PR" --name-only > /tmp/diff-files.txt 2>/dev/null || touch /tmp/diff-files.txt
          gh pr diff "$PR" > /tmp/full-diff.txt 2>/dev/null || touch /tmp/full-diff.txt

          # Resolve threads where the commented line was modified or the file was removed from the diff.
          # This breaks the circular dependency: fixed issues get resolved BEFORE Claude runs,
          # so Claude only sees genuinely outstanding threads.
          python3 << 'PYEOF'
          import json, re, subprocess, sys

          # Parse diff to find changed line ranges per file
          diff_text = open('/tmp/full-diff.txt').read()
          diff_files = set(l.strip() for l in open('/tmp/diff-files.txt') if l.strip())

          # Build a map of file -> set of changed line numbers (new-side)
          changed_lines = {}  # path -> set of line numbers
          current_file = None
          hunk_re = re.compile(r'^@@ -\d+(?:,\d+)? \+(\d+)(?:,(\d+))? @@')
          diff_header_re = re.compile(r'^diff --git a/.+ b/(.+)$')

          for line in diff_text.splitlines():
              m = diff_header_re.match(line)
              if m:
                  current_file = m.group(1)
                  if current_file not in changed_lines:
                      changed_lines[current_file] = set()
                  continue

              m = hunk_re.match(line)
              if m and current_file:
                  start = int(m.group(1))
                  count = int(m.group(2)) if m.group(2) else 1
                  # Track all lines in the hunk range as "changed region"
                  for i in range(start, start + count):
                      changed_lines[current_file].add(i)

          # Load threads
          data = json.load(open('/tmp/review-threads.json'))
          threads = data.get('data', {}).get('repository', {}).get('pullRequest', {}).get('reviewThreads', {}).get('nodes', [])

          resolved_count = 0
          remaining = []

          for t in threads:
              if t.get('isResolved'):
                  continue
              comments = t.get('comments', {}).get('nodes', [])
              if not comments:
                  continue
              author = comments[0].get('author', {}).get('login', '')
              if author != 'github-actions[bot]':
                  continue

              thread_id = t['id']
              path = t.get('path', '')
              line = t.get('line')
              should_resolve = False

              if path and path not in diff_files:
                  # File no longer in the diff — thread is outdated
                  should_resolve = True
              elif path and line and path in changed_lines:
                  # Check if the commented line falls within a changed hunk
                  file_changes = changed_lines[path]
                  if line in file_changes:
                      should_resolve = True

              if should_resolve:
                  result = subprocess.run(
                      ['gh', 'api', 'graphql', '-f',
                       f'query=mutation {{ resolveReviewThread(input: {{threadId: "{thread_id}"}}) {{ thread {{ isResolved }} }} }}'],
                      capture_output=True, text=True
                  )
                  if result.returncode == 0:
                      resolved_count += 1
                      print(f'Pre-resolved thread on {path}:{line} (line was modified)')
                  else:
                      print(f'Failed to resolve thread {thread_id}: {result.stderr}', file=sys.stderr)
                      # Keep it in remaining if resolution failed
                      remaining.append({
                          'id': thread_id,
                          'path': path,
                          'line': line,
                          'body': comments[0].get('body', '')[:200]
                      })
              else:
                  remaining.append({
                      'id': thread_id,
                      'path': path,
                      'line': line,
                      'body': comments[0].get('body', '')[:200]
                  })

          json.dump(remaining, open('/tmp/unresolved-threads.json', 'w'), indent=2)
          print(f'Pre-resolved {resolved_count} addressed thread(s), {len(remaining)} still unresolved')
          PYEOF

      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          use_sticky_comment: false
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns ${{ inputs.max-turns }}
            --allowedTools "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr checks:*),Bash(gh api:*),Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(find:*),Bash(tree:*),Bash(file:*),Bash(echo:*),Bash(mktemp:*),Write"
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.
            The PR branch is already checked out in the current working directory.

            ## How to Post Your Review

            You MUST post your review as a **GitHub Pull Request Review** with inline comments
            on specific lines of the diff — NOT as a general PR comment.

            Use the GitHub API to submit a review with inline comments:

            ```bash
            # Write review payload to a temp file, then submit
            cat > /tmp/review.json << 'REVIEW_JSON'
            {
              "event": "REQUEST_CHANGES",
              "body": "### Summary\n...\n\n### Findings\n...",
              "comments": [
                {
                  "path": "src/example.rs",
                  "line": 42,
                  "body": "**[MEDIUM]** Description of the issue and suggested fix."
                }
              ]
            }
            REVIEW_JSON
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              --input /tmp/review.json
            ```

            ### Review Event Rules
            - **`REQUEST_CHANGES`**: Use when there are CRITICAL, HIGH, or MEDIUM findings
            - **`COMMENT`**: Use when there are only LOW findings
            - **`APPROVE`**: Use when the PR looks good with no new issues, OR when all previous issues have been addressed

            CRITICAL: Always post a review, even if incomplete. A partial review is better than none.

            ### Mapping Findings to Diff Lines

            Each inline comment MUST reference a line that appears in the PR diff. To find the
            correct line numbers:
            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to see the diff
            2. Note the `+` lines and their line numbers (shown after `@@` markers)
            3. Use the NEW file line number (right side of the diff) for the `line` field
            4. The `path` must match the file path exactly as shown in the diff

            If a finding applies to a range or general pattern rather than a specific line,
            include it in the review `body` summary instead of as an inline comment.

            ### Handling Re-reviews (CRITICAL — prevents duplicate comments)

            A previous step has pre-fetched existing unresolved review threads into `/tmp/unresolved-threads.json`.
            Threads for issues that were already addressed (commented line was modified) have been
            automatically resolved — only genuinely outstanding threads remain in this file.

            Read this file FIRST:
            ```bash
            cat /tmp/unresolved-threads.json
            ```
            This contains an array of objects with `{id, path, line, body}` for each unresolved thread
            from previous review runs.

            **Deduplication rules:**
            - For each finding you would post, check if `/tmp/unresolved-threads.json` already has
              a thread on the same `path` covering the same issue → do NOT re-post it
            - Only post inline comments for genuinely NEW issues not covered by existing threads

            **Re-review decision logic (follow this exactly):**
            1. If `/tmp/unresolved-threads.json` is empty (`[]`) AND you find no new issues → post **APPROVE** (all previous issues were fixed)
            2. If `/tmp/unresolved-threads.json` is empty (`[]`) AND you find new issues → post **REQUEST_CHANGES** or **COMMENT** with only the new findings
            3. If `/tmp/unresolved-threads.json` has entries AND you find no new issues → do NOT post a new review (existing threads already cover it)
            4. If `/tmp/unresolved-threads.json` has entries AND you find new issues → post **REQUEST_CHANGES** or **COMMENT** with only the new findings

            **IMPORTANT**: When the unresolved threads list is empty, it means ALL previous issues
            were addressed. You MUST post an **APPROVE** review unless you find genuinely new problems
            in the code. Do not skip posting — the APPROVE is needed to unblock the PR.

            ## Process (follow this exact order)

            1. Read `/tmp/unresolved-threads.json` to see existing review threads from previous runs.
            2. Run `gh pr diff ${{ github.event.pull_request.number }}` to get the full diff.
            3. If needed, use Read/Glob/Grep to examine specific changed files for more context.
            4. Formulate findings — skip anything already covered by an existing unresolved thread.
            5. Follow the re-review decision logic above to decide your review event type.
            6. Build the review JSON payload with inline comments for new findings only.
            7. Post via `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews`.
            Note: Thread resolution and review dismissal happen automatically in a post-step.

            You have ${{ inputs.max-turns }} turns total. Budget your turns carefully:
            - Use at most HALF for reading code.
            - Reserve the LAST 2 turns for building and posting the review.
            - If you cannot review all files, review what you can and list the rest as unreviewed.

            ## Review Body Format

            Structure the review body (the `body` field in the JSON) like this:

            ## Review — PR #${{ github.event.pull_request.number }}

            ### Summary
            One-paragraph summary of what the PR does.

            ### Findings
            Brief list of findings with severity. Detailed comments are inline on the diff.
            If no issues: "PR looks good — no issues found."

            ### Files Reviewed
            List files you reviewed. Note any skipped due to turn budget.

            ## What to Look For

            1. **Bugs**: Logic errors, race conditions, edge cases, resource leaks
            2. **Security**: Injection, XSS, exposed secrets, input validation
            3. **Code Quality**: Readable, well-structured, follows project conventions
            4. **Performance**: Unnecessary allocations, N+1 queries, blocking in async
            5. **Testing**: New code paths covered? Edge cases? Meaningful assertions?

            ## Rules
            - ONLY comment on changed code (the diff), not pre-existing issues
            - **NEVER duplicate comments** — if an unresolved thread already exists for a finding (same file, same issue), do NOT post it again. This is the most important rule.
            - Be constructive: suggest fixes, not just problems
            - If the PR looks good, say so — do not invent issues to nitpick
            - Check CLAUDE.md in the repo root for project-specific conventions
            - Inline comments must reference lines that exist in the diff (new file line numbers)
            - Do NOT post a general `gh pr comment` — use the review API only

            ${{ inputs.review-extra }}

      - name: Resolve addressed threads and dismiss stale reviews
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          # Get the latest review state from github-actions[bot]
          LATEST_STATE=$(gh api "repos/${REPO}/pulls/${PR}/reviews" \
            --jq '[.[] | select(.user.login == "github-actions[bot]")] | last | .state // empty' 2>/dev/null || true)

          echo "Latest bot review state: ${LATEST_STATE:-none}"

          # Fetch current unresolved threads from github-actions[bot]
          THREADS=$(gh api graphql -f query='
            query {
              repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                pullRequest(number: '"$PR"') {
                  reviewThreads(first: 100) {
                    nodes {
                      id
                      isResolved
                      path
                      line
                      comments(first: 1) {
                        nodes { author { login } body }
                      }
                    }
                  }
                }
              }
            }' 2>/dev/null || echo '{}')

          # Resolve all remaining bot threads if latest review is APPROVE
          if [ "$LATEST_STATE" = "APPROVED" ]; then
            echo "Latest review is APPROVE — resolving all remaining bot threads"
            echo "$THREADS" | python3 -c "
          import json, sys, subprocess

          data = json.load(sys.stdin)
          threads = data.get('data', {}).get('repository', {}).get('pullRequest', {}).get('reviewThreads', {}).get('nodes', [])

          resolved_count = 0
          for t in threads:
              if t.get('isResolved'):
                  continue
              comments = t.get('comments', {}).get('nodes', [])
              if not comments:
                  continue
              author = comments[0].get('author', {}).get('login', '')
              if author != 'github-actions[bot]':
                  continue

              thread_id = t['id']
              path = t.get('path', '')
              result = subprocess.run(
                  ['gh', 'api', 'graphql', '-f',
                   f'query=mutation {{ resolveReviewThread(input: {{threadId: \"{thread_id}\"}}) {{ thread {{ isResolved }} }} }}'],
                  capture_output=True, text=True
              )
              if result.returncode == 0:
                  resolved_count += 1
                  print(f'Resolved thread on {path}:{t.get(\"line\", \"?\")}')
              else:
                  print(f'Failed to resolve thread {thread_id}: {result.stderr}', file=sys.stderr)

          print(f'Resolved {resolved_count} remaining thread(s) after approval')
          "
          fi

          # If latest review is APPROVE, dismiss any previous REQUEST_CHANGES
          if [ "$LATEST_STATE" = "APPROVED" ]; then
            echo "Dismissing stale REQUEST_CHANGES reviews"
            gh api "repos/${REPO}/pulls/${PR}/reviews" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and .state == "CHANGES_REQUESTED") | .id' \
            | while read -r review_id; do
                gh api "repos/${REPO}/pulls/${PR}/reviews/${review_id}/dismissals" \
                  -f message="All findings addressed — superseded by approval." -f event="DISMISS" \
                  --silent 2>/dev/null && echo "Dismissed review ${review_id}" || echo "Failed to dismiss review ${review_id}"
              done
          fi
